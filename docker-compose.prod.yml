# Production docker-compose — uses pre-built ECR image, no build step.
# Deployed by GitHub Actions to the EC2 instance via SSH.
# Required env vars: ECR_IMAGE, OPENWEATHER_API_KEY

services:
  app:
    image: ${ECR_IMAGE}
    ports:
      - "8000:8000"
    environment:
      - OPENWEATHER_API_KEY=${OPENWEATHER_API_KEY}
      - ENVIRONMENT=production
    restart: unless-stopped
    networks:
      - weather-net
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  prometheus:
    image: prom/prometheus:v2.51.0
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
    networks:
      - weather-net
    restart: unless-stopped

  grafana:
    image: grafana/grafana:10.3.0
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-admin123}
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana_data:/var/lib/grafana
    networks:
      - weather-net
    depends_on:
      - prometheus
    restart: unless-stopped

networks:
  weather-net:
    driver: bridge

volumes:
  prometheus_data:
  grafana_data:
