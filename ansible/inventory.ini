# Replace EC2_PUBLIC_IP with the value from: terraform output ec2_public_ip
# Replace path to your saved PEM key from: terraform output -raw ssh_private_key > ~/.ssh/weather-app-key.pem

[app_server]
ec2-server ansible_host=<EC2_PUBLIC_IP> ansible_user=ubuntu ansible_ssh_private_key_file=~/.ssh/weather-app-key.pem

[all:vars]
ansible_python_interpreter=/usr/bin/python3
ansible_ssh_common_args='-o StrictHostKeyChecking=no'
